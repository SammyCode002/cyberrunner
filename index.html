<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sam-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Cyberrunner</title>
    <meta name="description" content="A cybersecurity-themed endless runner. Dodge malware, phishing, and ransomware. Built with Phaser by Sam Dameg." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #050b14;
        color: #6bcce8;
        font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
        overflow: hidden;
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game canvas {
        display: block;
        image-rendering: pixelated;
        box-shadow: 0 0 60px rgba(107, 204, 232, 0.18);
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
